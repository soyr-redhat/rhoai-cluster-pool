---
apiVersion: console.openshift.io/v1
kind: OdhQuickStart
metadata:
  name: prelude-workshop-chat-loaded-model-3-3
  namespace: redhat-ods-applications
  annotations:
    opendatahub.io/categories: 'Getting started,Generative AI,Playground'
    platform.opendatahub.io/instance.name: default-dashboard
    internal.config.kubernetes.io/previousNamespaces: default
    platform.opendatahub.io/version: 3.3.0
    platform.opendatahub.io/type: OpenShift AI Self-Managed
  labels:
    app: rhods-dashboard
    app.kubernetes.io/part-of: rhods-dashboard
    app.opendatahub.io/rhods-dashboard: 'true'
    platform.opendatahub.io/part-of: dashboard
spec:
  description: Chat with a model that is already deployed in your OpenShift AI 3.3 project.
  displayName: Prelude -4- Workshop - Chat with a Loaded Model (5-10 min)
  appName: rhoai
  durationMinutes: 10
  icon: data:image/svg+xml;base64,
  introduction: |-
    ### Workshop: Chat with a loaded model in OpenShift AI 3.3

    This quick workshop is designed for about **5 to 10 minutes**.

    **Goal:** Open the Playground, pick a model that is already deployed, run a baseline chat, then tune behavior with a couple of settings.

    **Facilitator vibe:** Keep it simple and relaxed. You are not deploying anything in this exercise.

  prerequisites:
    - Access to the OpenShift AI dashboard.
    - Access to a project that already has a deployed generative model.
    - The model was deployed with **Add as AI asset endpoint** enabled.
    - Permission to create and use playgrounds in that project.

  tasks:
    - description: |-
        ### Confirm the model is ready

        Say this:

        *"We are not deploying today. We are just using a model that is already running in this project."*

        1. Open the OpenShift AI dashboard.

        2. Go to **Gen AI studio -> AI asset endpoints**.

        3. Select your project.

        4. Confirm your model appears under **Models**.

        If no model appears, stop here and confirm deployment settings with your platform admin.

      title: Task 1 - Preflight Model Endpoint
      review:
        instructions: |-
          Can you see at least one model in AI asset endpoints for this project?

        failedTaskHelp: If no model is listed, verify the correct project is selected and check that deployment used "Add as AI asset endpoint".
      summary:
        success: >-
          Great. The model endpoint is visible and ready for Playground.
        failed: Model endpoint not found yet. Fix endpoint visibility before continuing.

    - description: |-
        ### Open Playground with the loaded model

        Say this:

        *"Now we will open the Playground and chat with the model directly."*

        1. Go to **Gen AI studio -> Playground**.

        2. Select the same project used in Task 1.

        3. Click **Create playground**.

        4. Select the deployed model and click **Create**.

        5. Confirm the Playground opens with chat and settings panels.

      title: Task 2 - Create Playground Session
      review:
        instructions: |-
          Did Playground open with the selected model?

        failedTaskHelp: If model selection is empty, go back to AI asset endpoints and confirm you are in the same project.
      summary:
        success: >-
          Perfect. Playground is open and connected to your loaded model.
        failed: Playground is not ready yet. Recheck project and model selection.

    - description: |-
        ### Run a baseline chat

        Say this:

        *"Let us get a baseline answer first, then we will tune behavior."*

        1. Keep default settings.

        2. Send this prompt:

           `Give me a 3-bullet summary of what OpenShift AI is used for.`

        3. Send this follow-up:

           `Now explain that to a non-technical manager in 2 sentences.`

        4. Confirm responses are coherent and follow constraints.

      title: Task 3 - Baseline Prompt Test
      review:
        instructions: |-
          Did the model respond clearly and follow your prompt constraints?

        failedTaskHelp: If a response hangs, click Stop and retry with a shorter prompt.
      summary:
        success: >-
          Nice. Baseline chat is working.
        failed: Retry with shorter prompts and verify model availability.

    - description: |-
        ### Tune behavior and compare outputs

        Say this:

        *"Same model, different behavior. We will change one setting at a time."*

        1. Set **Temperature** to about `0.2`.

        2. Add this system instruction:

           `You are a concise technical assistant. Reply in 2-4 bullets.`

        3. Ask:

           `List practical first-week tasks for a new OpenShift AI team.`

        4. Change **Temperature** to about `0.8` and run the same prompt again.

        5. Compare outputs:
           - Lower temperature should be tighter and more predictable.
           - Higher temperature should be more varied.

        Optional stretch (if time remains): enable RAG, upload one small document, and ask one question that needs that document.

      title: Task 4 - Tune and Compare
      review:
        instructions: |-
          Were you able to compare low-temperature and high-temperature behavior?

        failedTaskHelp: If answers drift, tighten the system instruction and start a new chat.
      summary:
        success: >-
          Excellent. You completed the full 5-10 minute chat workshop.
        failed: Repeat the prompt comparison and verify settings changes are applied.

  conclusion: >-
    Great work. You completed a practical OpenShift AI 3.3 workflow: verify endpoint, open Playground, run baseline prompts, then tune output behavior.

    Next, you can save your best prompts and settings as your team baseline for demos, testing, and app integration.

    Reference guides:
    - Experimenting with models in the gen AI playground
    - Deploying models

  nextQuickStart: []
