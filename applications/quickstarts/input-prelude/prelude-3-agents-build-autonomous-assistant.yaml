spec:
  description: Build an autonomous AI agent that can use tools, make decisions, and solve complex tasks.
  displayName: Prelude -3- Build an Autonomous AI Agent
  appName: rhoai
  durationMinutes: 30
  icon: data:image/png;base64,
  introduction: |-
    ### Experience 3: Build an Autonomous AI Agent

    **What is an AI Agent?**
    An AI agent is a system that can autonomously use tools, make decisions, and complete multi-step tasks.
    Unlike simple chatbots that just generate text, agents can **take actions** and **reason** about what to do next.

    **The demo: Trip Planning Assistant**
    where you'll watch an agent autonomously plan a trip by:
    - Searching the web for weather forecasts
    - Finding activity recommendations
    - Calculating total trip costs
    - Combining all information into a comprehensive travel plan

    All without any hardcoded logic - the agent decides what to do at each step.

    **What will be accomplished:**
    - Explore the tools available to agents (weather, calculator, etc.)
    - Watch an agent autonomously solve a multi-step trip planning problem
    - Analyze how the agent chooses which tools to use and when
    - Test your own multi-step challenges

    **Why this matters:**
    - Agents can automate complex workflows that previously required human decision-making
    - They transparently show their reasoning at each step (not a black box)
    - Any API, database, or function can become an agent tool
    - Everything runs locally in your OpenShift environment

  prerequisites:
    - Completed "Prelude -2- Talk to Your Own Data (RAG)" quickstart
    - Access to the OpenShift cluster (already provisioned)
    - Admin credentials (username and password)
    - Basic understanding of LLMs and tool calling

  tasks:
    - description: |-
        ### Return to the Chat Interface

        Good news! The agent capabilities use the same OpenWebUI interface from the RAG quickstart. Let's return there.

        1. Navigate to the **OpenShift Console** by clicking the 3x3 checkered square icon in the top right corner

        2. Go to **Home → Projects**

        3. Find and select the **chat** project (same as Prelude 1 and 2)

        4. Scroll down until you see the section titled Inventory. Within the Inventory section, locate the Routes subsection which should show 4 Routes. Select it.
        
        5. Click on the **chat-openwebui** route URL

        6. Login with OpenShift using the **admin** user and password

        **What's new for agents?**
        Behind the scenes, OpenShift has deployed MCP (Model Context Protocol) tools to the chat project:
        - **kubernetes-mcp-server:** Kubernetes/OpenShift API access and utilities
        - **mcp-weather:** Provides weather forecast data

        These tools are running in the same project as the chat application, ready to be used by agents.

      title: Task 1 - Access the Chat Interface
      review:
        instructions: |-
          Did you successfully access OpenWebUI (same interface as the chat and RAG quickstarts)?

        failedTaskHelp: This is the same interface from Prelude -2-. If access failed, verify the chat project exists and the route is active.
      summary:
        success: >-
          Perfect! You're back in OpenWebUI where agent tools are available.
        failed: Access failed. This should be the same route from the RAG quickstart.

    - description: |-
        ### Verify MCP Tools Are Running

        OpenShift deployed agent tools automatically using GitOps. Let's verify they're running.

        **Option A: Check via OpenShift Console (Recommended)**

        1. In the **OpenShift Console**, navigate to **Home → Projects**

        2. Select the **chat** project (the same project from previous preludes)

        3. In the left navigation, go to **Workloads → Pods**

        4. You should see the MCP tool pods:
           - `kubernetes-mcp-server-*` (Kubernetes/OpenShift API access)
           - `mcp-weather-*` (weather forecast data)

        5. Check that pods are in **Running** status

        6. Navigate to **Networking → Routes** to see the MCP tool endpoints

        **Option B: Check via OpenWebUI (Alternative)**

        1. In OpenWebUI, click your **profile icon** (top right)

        2. Go to **Settings**

        3. Look for **External Tools** section

        4. Check if MCP tools are listed and connected

        **What you're seeing:**
        These are containerized microservices that provide tools to AI agents. Each tool:
        - Has a specific function (weather, calculator, etc.)
        - Exposes an API the LLM can call
        - Runs independently in its own pod
        - Is managed by OpenShift GitOps

        **Key OpenShift concept:** Infrastructure-as-Code via ACM Policy and ArgoCD deployed these tools automatically when the cluster was provisioned.

      title: Task 2 - Verify Agent Tools Are Deployed
      review:
        instructions: |-
          Can you see MCP tool pods running in the chat project?

        failedTaskHelp: If pods aren't visible, check that you selected the "chat" project in the console. The tools may still be deploying - wait 1-2 minutes and refresh.
      summary:
        success: >-
          Excellent! MCP agent tools are running and ready to use.
        failed: Tools not visible. Check the chat project or wait for deployment to complete.

    - description: |-
        ### Discover Available MCP Tools

        The MCP tools are deployed and ready to use. Let's explore what tools are available in OpenWebUI.

        **Steps:**

        1. In **OpenWebUI**, click your **profile icon** (top right)

        2. Go to **Settings**

        3. Look for the **External Tools** section

        4. You should see the connected MCP tools:
           - **kubernetes-mcp-server** - Kubernetes/OpenShift API access
           - **mcp-weather** - Weather forecast data
           - (Tools show their connection status and available functions)

        5. **Browse the tool descriptions** - each tool shows:
           - What functions it provides
           - Connection status
           - Available operations

        6. These tools are **registered and available** to enable in your chats

        **What you're seeing:**
        OpenWebUI has connected to the MCP tools running in the `chat` project. These tools are now available to use in your conversations.

        **Key insight:**
        While tools are registered here, you'll need to **enable them per chat session** using the Integrations button (covered in the next task). Once enabled, the LLM intelligently decides when to use them based on your question.

      title: Task 3 - Discover Available MCP Tools
      review:
        instructions: |-
          Can you see MCP tools listed in Settings → External Tools?

        failedTaskHelp: If you don't see the External Tools section, check that you're in Settings (click profile icon → Settings). If tools still aren't visible, they may not be connected yet - proceed to the next task to test if they work anyway.
      summary:
        success: >-
          Excellent! You've discovered the available MCP agent tools.
        failed: Tools not visible. Proceed to next task to test if they work anyway.

    - description: |-
        ### Execute the Trip Planning Task

        Now give the agent a realistic multi-step task that requires planning, research, and calculation.

        **The Trip Planning Challenge:**

        Ask the agent this question:

        *"What's the current weather in Boston? Based on that weather, recommend 3 suitable outdoor or indoor activities. If each activity costs around $30 and lunch costs $15 per day for 2 days, what's my total estimated cost?"*

        **Why this demonstrates tool calling:**
        - Uses the **weather tool** to get real-time weather data for Boston
        - The model uses weather context to provide relevant activity recommendations
        - The model performs **cost calculations** ($90 for activities + $30 for lunches = $120)
        - Demonstrates **tool integration** - the agent gets real data from an external MCP server

        **Steps:**

        1. Start a new conversation with the agent

        2. **CRITICAL: Enable Tools for This Chat Session**
           - Look for the **diamond-shaped "Integrations" button** in the chat interface (appears as 4 smaller squares forming a diamond ◆)
           - This button is typically located near the message input area or in the top toolbar
           - Click the **Integrations** button
           - A panel will appear showing available tools
           - **Select/enable the tools you want to use** for this conversation:
             - ✓ Enable **mcp-weather** (for weather queries)
             - ✓ Enable any other relevant tools that appear
           - Close the integrations panel
           - **Note:** Tools must be enabled per chat session - this is not automatic!

        3. Copy and paste the trip planning question above (or modify for a different city)

        4. **Watch the agent work** - most interfaces show the agent's "thinking" in real-time:
           - See it plan the approach ("First I'll check weather, then find activities...")
           - Watch it decide which tool to call next
           - See each tool's response
           - Observe how it combines information

        5. **Review the final answer** - it should include:
           - Weather forecast (from the weather tool)
           - 3 recommended activities
           - Total cost calculation with breakdown

        **This is the magic moment:** The agent is autonomously choosing tools, making API calls, and reasoning through a multi-step problem - all visible to you.

        **Troubleshooting:** If the model responds with "I don't have access to real-time weather data" or similar, you forgot to enable tools via the Integrations (◆) button. Go back to step 2!

      title: Task 4 - Execute the Trip Planning Task
      review:
        instructions: |-
          Did the agent successfully provide weather, recommendations, and a cost calculation?

        failedTaskHelp: |-
          If the agent failed, the most common issue is forgetting to enable tools via the Integrations (◆) button - make sure you clicked it and selected the tools before sending your question. If tools are enabled but still not working, try a simpler test like "What's the weather in New York?" to isolate the issue.
      summary:
        success: >-
          Excellent! The agent autonomously planned a trip using multiple tools and calculations.
        failed: The agent couldn't complete the task. Verify tool connectivity and try a simpler question first.

    - description: |-
        ### Analyze the Agent's Decision-Making

        Now let's examine **how** the agent solved the trip planning task. This is where agent transparency becomes valuable.

        **Review the execution trace and identify:**

        1. **Initial Planning**
           - Did the agent outline its approach at the start?
           - Example: "I'll search for Boston weather, then find activities, then calculate costs"

        2. **Tool Selection Logic**
           - Check which tool was called for each sub-task:
             - Weather/attractions → should use **Web Search**
             - Cost calculation → should use **Calculator**
           - Did it choose the right tool each time?

        3. **Order of Operations**
           - Agents can work in different orders (both valid):
             - Sequential: weather → activities → calculation
             - Parallel: gather all info, then calculate
           - What order did your agent choose? Why might it have chosen that?

        4. **Error Resilience (Try This)**
           - Ask a follow-up: *"Actually, I want to go to Paris instead. What changes?"*
           - Watch the agent adapt its previous answer
           - See if it reuses calculations or starts fresh

        5. **Transparency Check**
           - Can you see **every tool call** that was made?
           - Are the tool responses visible?
           - Could you audit this if needed?

        **Key insight:** Unlike a black-box AI, agents show their work. Every decision is traceable.

      title: Task 5 - Analyze the Agent's Decision-Making
      review:
        instructions: |-
          Can you identify which tools were called and in what order?

        failedTaskHelp: If the tool calls aren't visible, look for a "Show Details", "Debug Mode", or "Tool Calls" toggle in the UI. Some interfaces show this in a sidebar or expandable section.
      summary:
        success: >-
          Perfect! You can see exactly how the agent made decisions and used tools.
        failed: Tool execution not visible. Look for a debug or detail view option.

    - description: |-
        ### Try Your Own Multi-Step Challenge

        Now that you've seen how agents work, create your own multi-step task.

        **Before you start:** Remember to enable the appropriate tools via the Integrations (◆) button for each new chat session!

        **Challenge ideas to try:**

        1. **Budget Comparison:**
           - *"Compare the cost of a 3-day trip to Chicago vs Miami. Assume $100/night hotel and $40/day for food."*
           - Should use calculator multiple times

        2. **Research + Calculation:**
           - *"What's the population of Tokyo, and how many baseball stadiums would fit in that city area?"*
           - Requires web search + math + creative reasoning

        3. **Document + Web Hybrid (if RAG is enabled):**
           - *"Based on our company travel policy document, can I expense a $200 dinner in New York?"*
           - Should query knowledge base + potentially search for NYC restaurant norms

        4. **Multi-Location Planning:**
           - *"I'm visiting San Francisco, Seattle, and Portland. What's the weather in each city and which should I visit first based on best weather?"*
           - Requires multiple searches + comparison logic

        **What to observe:**
        - Does the agent break down the problem correctly?
        - Are the tool choices appropriate?
        - Does it show its reasoning at each step?

        **Optional: Share your results**
        - Try a creative multi-step question
        - See if you can "stump" the agent
        - Notice when it asks for clarification vs makes assumptions

      title: Task 6 - Try Your Own Multi-Step Challenge
      review:
        instructions: |-
          Did you try your own multi-step challenge and observe how the agent handled it?

        failedTaskHelp: This task is open-ended and exploratory. Any multi-step question that requires 2+ tools counts as a success. The goal is experimentation. Remember to enable tools via the Integrations (◆) button if starting a new chat!
      summary:
        success: >-
          Amazing! You're now thinking like an agent developer - breaking problems into tool-enabled steps.
        failed: Feel free to try more examples or proceed to the conclusion.

  conclusion: |-
    Congratulations! You've witnessed autonomous AI agents in action.

    **What was accomplished:**
    - Explored the tools available to agents (calculator, web search, etc.)
    - Watched an agent autonomously plan and execute a trip planning task
    - Analyzed how the agent chose which tools to use and when
    - Experimented with your own multi-step challenges

    **Key takeaway:**
    Agents are not just chatbots. They are autonomous systems that can:
    - Break down complex problems into steps
    - Choose and use the right tools for each sub-task
    - Show transparent reasoning at every step
    - Adapt when things change

    **This is the foundation of agentic AI:**
    - **Transparency:** Every tool call is visible and auditable
    - **Autonomy:** The agent decides the approach, not hardcoded rules
    - **Extensibility:** Any API or function can become an agent tool
    - **Local control:** All processing happens in your OpenShift environment

    **Real-world applications:**
    - Customer service agents that look up orders, process refunds, check inventory
    - DevOps agents that diagnose issues, query logs, run tests
    - Research agents that gather data, analyze trends, generate reports
    - Data processing agents that clean, transform, and validate datasets

    **Next steps:**
    - Think about multi-step processes in your work that could be automated
    - Explore what tools exist in your environment (databases, APIs, services)
    - Continue to Experience 4 (if available) or explore advanced agent patterns
    - Read the OpenShift AI documentation on model serving and tool integration

