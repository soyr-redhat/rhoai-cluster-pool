spec:
  description: Build an autonomous AI agent that can use tools, make decisions, and solve complex tasks.
  displayName: Prelude -3- Build an Autonomous AI Agent
  appName: rhoai
  durationMinutes: 25
  icon: data:image/png;base64,
  introduction: |-
    ### Experience 3: Build an Autonomous AI Agent

    **What is an AI Agent?**
    An AI agent is a system that can autonomously use tools, make decisions, and complete multi-step tasks.
    Unlike simple chatbots that just generate text, agents can **take actions** and **reason** about what to do next.

    **The demo: Trip Planning Assistant**
    You'll watch an agent autonomously plan a trip by:
    - Searching the web for weather forecasts
    - Finding activity recommendations
    - Calculating total costs
    - Combining all information into a comprehensive travel plan

    All without any hardcoded logic - the agent decides what to do at each step.

    **What will be accomplished:**
    - Explore the tools available to agents (web search, calculator, etc.)
    - Watch an agent autonomously solve a multi-step trip planning problem
    - Analyze how the agent chooses which tools to use and when
    - Test your own multi-step challenges

    **Why this matters:**
    - Agents can automate complex workflows that previously required human decision-making
    - They transparently show their reasoning at each step (not a black box)
    - Any API, database, or function can become an agent tool
    - Everything runs locally in your OpenShift environment

  prerequisites:
    - Completed "Prelude -2- Talk to Your Own Data (RAG)" quickstart
    - Access to the OpenShift cluster
    - Admin credentials (username and password)
    - Basic understanding of LLMs and tool calling

  tasks:
    - description: |-
        ### Access the Agent Interface

        In this task, navigate to the agent-enabled interface where AI agents can be created and managed.

        1. Navigate to the **OpenShift Console** from the hamburger menu titled "Applications" in the top right corner

        2. Go to **Home → Projects**

        3. Find and select the **agent** project (or relevant project with agent capabilities)

        4. In the left navigation, click **Networking → Routes**

        5. Click on the agent interface route URL

        6. Login with OpenShift using the **admin** user and password

        **What is an agent?**
        An agent is more than a chatbot. It can:
        - Access external tools (calculators, databases, APIs)
        - Make multi-step plans
        - Execute actions autonomously
        - Self-correct when errors occur

      title: Task 1 - Access the Agent Interface
      review:
        instructions: |-
          Did you successfully access the agent interface?

        failedTaskHelp: If access failed, verify the project name and ensure the route is active. Check that the admin credentials are correct.
      summary:
        success: >-
          Great! The agent interface is ready.
        failed: Access failed. Verify the project and route settings.

    - description: |-
        ### Explore Available Tools

        Before creating an agent, let's see what tools are available. Agents become powerful when they have the right tools.

        **Common tools you might see:**
        - **Calculator:** Perform mathematical operations (addition, multiplication, percentages, etc.)
        - **Web Search:** Look up current information from the internet
        - **Weather API:** Get weather forecasts for specific locations
        - **Knowledge Base:** Query uploaded documents (from the RAG quickstart)
        - **Python Executor:** Run code snippets for data processing

        **Steps:**

        1. In the agent interface, look for a **Tools** or **Functions** section

        2. **Browse the available tools** - note which ones are enabled

        3. **Read the tool descriptions** carefully - the agent uses these same descriptions to decide when to use each tool

        4. Make sure at least these tools are available:
           - **Web Search** (for finding current information)
           - **Calculator** (for cost calculations)
           - **Weather API** (if available - for trip planning)

        **Key insight:**
        The agent doesn't "know" what tools do beyond reading their descriptions. Clear tool descriptions = better agent decisions.

      title: Task 2 - Explore Available Tools
      review:
        instructions: |-
          Can you see the available tools and their descriptions?

        failedTaskHelp: If tools aren't visible, check if the agent interface has a "Tools", "Functions", or "Capabilities" section. Some interfaces show tools only when starting a conversation.
      summary:
        success: >-
          Perfect! You understand what tools the agent has access to.
        failed: Tools section not found. Try starting a conversation first.

    - description: |-
        ### Execute the Trip Planning Task

        Now give the agent a realistic multi-step task that requires planning, research, and calculation.

        **The Trip Planning Challenge:**

        Ask the agent this question:

        *"I want to visit Boston next month. What will the weather be like? Recommend 3 popular things to do. If each activity costs around $30 and lunch costs $15 per day for 2 days, what's my total estimated cost?"*

        **Why this task is challenging:**
        - Requires **web search** (weather forecast, Boston attractions)
        - Requires **calculator** (total cost calculation: 3 activities × $30 + 2 lunches × $15)
        - Requires **planning** (agent must decide order of operations)
        - Requires **synthesis** (combining results into a coherent answer)

        **Steps:**

        1. Start a new conversation with the agent

        2. Copy and paste the trip planning question above (or modify for a different city)

        3. **Watch the agent work** - most interfaces show the agent's "thinking" in real-time:
           - See it plan the approach ("First I'll check weather, then find activities...")
           - Watch it decide which tool to call next
           - See each tool's response
           - Observe how it combines information

        4. **Review the final answer** - it should include:
           - Weather forecast
           - 3 recommended activities
           - Total cost calculation with breakdown

        **This is the magic moment:** The agent is autonomously choosing tools, making API calls, and reasoning through a multi-step problem - all visible to you.

      title: Task 3 - Execute the Trip Planning Task
      review:
        instructions: |-
          Did the agent successfully provide weather, recommendations, and a cost calculation?

        failedTaskHelp: If the agent failed, try a simpler test first like "What is 25 * 4?" to verify tools work. Check that web search and calculator tools are enabled. The agent might also need internet access.
      summary:
        success: >-
          Excellent! The agent autonomously planned a trip using multiple tools and calculations.
        failed: The agent couldn't complete the task. Verify tool connectivity and try a simpler question first.

    - description: |-
        ### Analyze the Agent's Decision-Making

        Now let's examine **how** the agent solved the trip planning task. This is where agent transparency becomes valuable.

        **Review the execution trace and identify:**

        1. **Initial Planning**
           - Did the agent outline its approach at the start?
           - Example: "I'll search for Boston weather, then find activities, then calculate costs"

        2. **Tool Selection Logic**
           - Check which tool was called for each sub-task:
             - Weather/attractions → should use **Web Search**
             - Cost calculation → should use **Calculator**
           - Did it choose the right tool each time?

        3. **Order of Operations**
           - Agents can work in different orders (both valid):
             - Sequential: weather → activities → calculation
             - Parallel: gather all info, then calculate
           - What order did your agent choose? Why might it have chosen that?

        4. **Error Resilience (Try This)**
           - Ask a follow-up: *"Actually, I want to go to Paris instead. What changes?"*
           - Watch the agent adapt its previous answer
           - See if it reuses calculations or starts fresh

        5. **Transparency Check**
           - Can you see **every tool call** that was made?
           - Are the tool responses visible?
           - Could you audit this if needed?

        **Key insight:** Unlike a black-box AI, agents show their work. Every decision is traceable.

      title: Task 4 - Analyze the Agent's Decision-Making
      review:
        instructions: |-
          Can you identify which tools were called and in what order?

        failedTaskHelp: If the tool calls aren't visible, look for a "Show Details", "Debug Mode", or "Tool Calls" toggle in the UI. Some interfaces show this in a sidebar or expandable section.
      summary:
        success: >-
          Perfect! You can see exactly how the agent made decisions and used tools.
        failed: Tool execution not visible. Look for a debug or detail view option.

    - description: |-
        ### Try Your Own Multi-Step Challenge

        Now that you've seen how agents work, create your own multi-step task.

        **Challenge ideas to try:**

        1. **Budget Comparison:**
           - *"Compare the cost of a 3-day trip to Chicago vs Miami. Assume $100/night hotel and $40/day for food."*
           - Should use calculator multiple times

        2. **Research + Calculation:**
           - *"What's the population of Tokyo, and how many baseball stadiums would fit in that city area?"*
           - Requires web search + math + creative reasoning

        3. **Document + Web Hybrid (if RAG is enabled):**
           - *"Based on our company travel policy document, can I expense a $200 dinner in New York?"*
           - Should query knowledge base + potentially search for NYC restaurant norms

        4. **Multi-Location Planning:**
           - *"I'm visiting San Francisco, Seattle, and Portland. What's the weather in each city and which should I visit first based on best weather?"*
           - Requires multiple searches + comparison logic

        **What to observe:**
        - Does the agent break down the problem correctly?
        - Are the tool choices appropriate?
        - Does it show its reasoning at each step?

        **Optional: Share your results**
        - Try a creative multi-step question
        - See if you can "stump" the agent
        - Notice when it asks for clarification vs makes assumptions

      title: Task 5 - Try Your Own Multi-Step Challenge
      review:
        instructions: |-
          Did you try your own multi-step challenge and observe how the agent handled it?

        failedTaskHelp: This task is open-ended and exploratory. Any multi-step question that requires 2+ tools counts as a success. The goal is experimentation.
      summary:
        success: >-
          Amazing! You're now thinking like an agent developer - breaking problems into tool-enabled steps.
        failed: Feel free to try more examples or proceed to the conclusion.

  conclusion: >-
    Congratulations! You've witnessed autonomous AI agents in action.

    **What was accomplished:**
    - Explored the tools available to agents (calculator, web search, etc.)
    - Watched an agent autonomously plan and execute a trip planning task
    - Analyzed how the agent chose which tools to use and when
    - Experimented with your own multi-step challenges

    **Key takeaway:**
    Agents are not just chatbots. They are autonomous systems that can:
    - Break down complex problems into steps
    - Choose and use the right tools for each sub-task
    - Show transparent reasoning at every step
    - Adapt when things change

    **This is the foundation of agentic AI:**
    - **Transparency:** Every tool call is visible and auditable
    - **Autonomy:** The agent decides the approach, not hardcoded rules
    - **Extensibility:** Any API or function can become an agent tool
    - **Local control:** All processing happens in your OpenShift environment

    **Real-world applications:**
    - Customer service agents that look up orders, process refunds, check inventory
    - DevOps agents that diagnose issues, query logs, run tests
    - Research agents that gather data, analyze trends, generate reports
    - Data processing agents that clean, transform, and validate datasets

    **Next steps:**
    - Think about multi-step processes in your work that could be automated
    - Explore what tools exist in your environment (databases, APIs, services)
    - Continue to Experience 4 (if available) or explore advanced agent patterns
    - Read the OpenShift AI documentation on model serving and tool integration

